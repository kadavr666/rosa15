backend:
  name: git-gateway
  branch: main

media_folder: "/"
public_folder: "/"

collections:
  - name: "content"
    label: "Site Content"
    files:
      - label: "Homepage"
        name: "homepage"
        file: "content.json"
        fields:
          - { label: "About - Subtitle", name: "about_subtitle", widget: "string" }
          - { label: "About - Title", name: "about_title", widget: "string" }
          - { label: "About - Description", name: "about_description", widget: "text" }
          - { label: "Footer Text", name: "footer_text", widget: "text" }
          - { label: "Contact Email", name: "contact_email", widget: "string" }
          - { label: "Instagram URL", name: "instagram_url", widget: "string" }
          - { label: "Crowdfunding Title", name: "crowdfunding_title", widget: "string" }
          - { label: "Crowdfunding Description", name: "crowdfunding_description", widget: "text" }
          - label: "Tiers"
            name: "tiers"
            widget: "list"
            collapsed: true
            minimize_collapsed: true
            summary: "{{fields.title}} — {{fields.price}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Price", name: "price", widget: "string" }
          - label: "Custom Sections"
            name: "sections"
            widget: "list"
            collapsed: true
            minimize_collapsed: true
            summary: "{{fields.title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Text", name: "text", widget: "text" }
              - label: "Items"
                name: "items"
                widget: "list"
                collapsed: true
                minimize_collapsed: true
                summary: "{{fields.title}} — {{fields.price}}"
                required: false
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
                  - { label: "Price", name: "price", widget: "string", required: false }
