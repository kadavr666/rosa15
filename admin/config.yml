backend:
  name: git-gateway
  branch: main

media_folder: "/"
public_folder: "/"

collections:
  - name: "content"
    label: "Site Content"
    files:
      - label: "Homepage"
        name: "homepage"
        file: "content.json"
        fields:
          - label: "About"
            name: "about"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Subtitle", name: "subtitle", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
          - label: "Footer"
            name: "footer"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Text", name: "text", widget: "text" }
              - { label: "Contact Email", name: "contact_email", widget: "string" }
              - { label: "Instagram URL", name: "instagram_url", widget: "string" }
          - label: "Crowdfunding"
            name: "crowdfunding"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - label: "Tiers"
                name: "tiers"
                widget: "list"
                collapsed: true
                minimize_collapsed: true
                summary: "{{fields.title}} — {{fields.price}}"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
                  - { label: "Price", name: "price", widget: "string" }
          - label: "Custom Sections"
            name: "sections"
            widget: "list"
            collapsed: true
            minimize_collapsed: true
            summary: "{{fields.title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Text", name: "text", widget: "text" }
              - label: "Items"
                name: "items"
                widget: "list"
                collapsed: true
                minimize_collapsed: true
                summary: "{{fields.title}} — {{fields.price}}"
                required: false
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
                  - { label: "Price", name: "price", widget: "string", required: false }
