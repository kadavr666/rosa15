<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rosa 15</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .projects-grid {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding: 20px;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            min-height: 60vh;
        }

        .projects-grid::-webkit-scrollbar {
            height: 1px;
        }

        .projects-grid::-webkit-scrollbar-track {
            background: transparent;
        }

        .projects-grid::-webkit-scrollbar-thumb {
            background: #000;
        }

        .project-card {
            flex: 0 0 auto;
            width: 40vw;
            scroll-snap-align: start;
            text-decoration: none;
            color: #000;
        }

        .project-card {
            perspective: 1500px;
        }

        .card-flip {
            position: relative;
            height: 55vh;
            transform-style: preserve-3d;
        }

        .card-face {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
        }

        .card-face img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .card-back {
            transform: rotateY(180deg);
        }

        @keyframes card-spin {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        .project-card-title {
            font-size: 22px;
            letter-spacing: 0.1em;
            text-align: center;
            padding: 20px 0;
            line-height: 1.2;
        }

        @media (max-width: 1420px) {
            .project-card {
                width: 70vw;
            }
        }

        @media (max-width: 768px) {
            .project-card {
                width: 85vw;
            }

            .card-flip {
                height: 40vh;
            }

            .project-card-title {
                font-size: 20px;
            }

            .projects-grid {
                padding-bottom: 0;
                min-height: auto;
            }
        }
    </style>
</head>
<body>
    <main>
        <div class="projects-grid" id="projects"></div>
        <footer id="footer">
            <div class="footer-content">
                <div class="footer-links"></div>
                <div class="footer-text"></div>
            </div>
        </footer>
        <a href="/" class="mobile-logo">
            <img src="logo_black.svg" alt="Rosa Logo">
        </a>
    </main>

    <script>
        const PROJECT_ID = 'hp2p0iij';
        const DATASET = 'production';
        const API = `https://${PROJECT_ID}.api.sanity.io/v2024-01-01/data/query/${DATASET}`;

        function sanityImageUrl(ref) {
            if (!ref) return '';
            const [, id, dims, ext] = ref.split('-');
            return `https://cdn.sanity.io/images/${PROJECT_ID}/${DATASET}/${id}-${dims}.${ext}`;
        }

        function query(q) {
            return fetch(`${API}?query=${encodeURIComponent(q)}`)
                .then(r => r.json())
                .then(r => r.result);
        }

        Promise.all([
            query('*[_type == "project"]{ title, subtitle, slug, heroImage, heroImageHover } | order(_createdAt desc)'),
            query('*[_type == "siteSettings"][0]{ footerText, contactEmail, instagramUrl }'),
        ]).then(([projects, settings]) => {
            // Projects grid
            const grid = document.getElementById('projects');
            if (projects && projects.length) {
                grid.innerHTML = projects.map((p, i) => {
                    const speed = 12 + Math.random() * 16;
                    const front = p.heroImage ? sanityImageUrl(p.heroImage.asset._ref) : '';
                    const back = p.heroImageHover ? sanityImageUrl(p.heroImageHover.asset._ref) : front;
                    const slug = p.slug ? p.slug.current : '';
                    return `<a class="project-card" href="project.html?slug=${slug}">` +
                        `<div class="card-flip" style="animation: card-spin ${speed.toFixed(1)}s linear infinite">` +
                        (front ? `<div class="card-face card-front"><img src="${front}" alt="${p.title || ''}"></div>` : '') +
                        (back ? `<div class="card-face card-back"><img src="${back}" alt="${p.title || ''}"></div>` : '') +
                        `</div>` +
                        `<div class="project-card-title">${p.title || ''}${p.subtitle ? '<br>' + p.subtitle : ''}</div>` +
                        `</a>`;
                }).join('');
            }

            // Footer
            if (settings) {
                if (settings.footerText) {
                    document.querySelector('.footer-text').innerHTML = `<p>${settings.footerText}</p>`;
                }
                let linksHtml = '';
                if (settings.contactEmail) linksHtml += `<a href="mailto:${settings.contactEmail}">Contact</a>`;
                if (settings.instagramUrl) linksHtml += `<a href="${settings.instagramUrl}" target="_blank">Instagram</a>`;
                document.querySelector('.footer-links').innerHTML = linksHtml;
            }
        });
    </script>

    <a href="/" class="fixed-logo">
        <img src="logo_rosa.svg" alt="Rosa Logo">
    </a>
</body>
</html>
